name: "Bug report"
description: "Report something that is broken or incorrect."
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for defects in behavior or unexpected errors.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps to reproduce the issue.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: What actually happened.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and any relevant configuration.
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack traces
      description: Paste relevant logs or stack traces, if any.
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: How we will know the bug is fixed (tests, manual checks, etc.).

